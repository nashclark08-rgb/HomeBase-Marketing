<style>
:root{
  --bg:#F2F2F7; --card:#fff; --text:#1C1C1E; --text-secondary:#8E8E93;
  --border:#E5E5EA; --row-border:#F2F2F7; --navy:#1C3A6B; --navy-soft:#1C3A6B18;
  --topbar:#1C3A6B; --shadow-sm:0 1px 3px rgba(0,0,0,0.05); --shadow-md:0 1px 6px rgba(0,0,0,0.08);
  --input-bg:#fff;
}
[data-theme="dark"]{
  --bg:#000; --card:#1C1C1E; --text:#fff; --text-secondary:#8E8E93;
  --border:#38383A; --row-border:#2C2C2E; --navy:#5B8FE8; --navy-soft:rgba(91,143,232,0.15);
  --topbar:#1C1C1E; --shadow-sm:0 1px 3px rgba(0,0,0,0.4); --shadow-md:0 1px 6px rgba(0,0,0,0.5);
  --input-bg:#2C2C2E;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{width:100%;min-height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);padding-top:60px;padding-top:max(60px,calc(env(safe-area-inset-top) + 50px));transition:background 0.2s,color 0.2s;}
#app{display:flex;flex-direction:column;width:100%;min-height:100%;}
.topbar{background:#1C3A6B;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;padding-top:max(10px,env(safe-area-inset-top));position:fixed;top:0;left:0;right:0;z-index:100}
.screen{background:var(--bg);}
.tabbar{background:rgba(249,249,249,0.97);backdrop-filter:blur(20px);border-top:0.5px solid rgba(0,0,0,0.15);display:flex;padding-bottom:env(safe-area-inset-bottom);position:fixed;bottom:0;left:0;right:0;z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;border:none;background:transparent;cursor:pointer;gap:2px;font-family:inherit;font-size:9px;font-weight:600;color:#8E8E93;min-width:0}
.tab.active{color:#1C3A6B}
.scroll-view{display:block;}

.card{background:var(--card);border-radius:14px;margin:0 16px;box-shadow:var(--shadow-md);overflow:hidden}
.sh{padding:8px 16px 4px;font-size:12px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:0.6px}
.row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--row-border)}
.row:last-child{border-bottom:none}
.btn{border:none;cursor:pointer;font-family:inherit;background:none;padding:0}
.back-btn{display:flex;align-items:center;gap:4px;color:#1C3A6B;font-size:15px;font-weight:500;border:none;background:none;cursor:pointer;font-family:inherit}
.primary-btn{width:100%;padding:15px;border:none;border-radius:12px;background:#1C3A6B;color:#fff;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:-0.2px;transition:opacity 0.15s,transform 0.1s}
.primary-btn:active{opacity:0.8}
.secondary-btn{width:100%;padding:15px;border:none;border-radius:12px;background:rgba(28,58,107,0.08);color:#1C3A6B;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:-0.2px}
.green-btn{width:100%;padding:16px;border:none;border-radius:14px;background:#34C759;color:#fff;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit}
.input{width:100%;padding:13px 16px;border:1px solid var(--border);border-radius:11px;font-size:16px;font-family:inherit;outline:none;background:var(--input-bg);color:var(--text);-webkit-appearance:none;transition:border-color 0.15s,box-shadow 0.15s}
.input:focus{border-color:#1C3A6B;box-shadow:0 0 0 3px rgba(28,58,107,0.1)}
.err{color:#FF3B30;font-size:13px;text-align:center;min-height:16px;margin-top:4px}
.toggle{width:51px;height:31px;border-radius:16px;position:relative;cursor:pointer;transition:background 0.2s;border:none;padding:0}
.thumb{position:absolute;top:2px;width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.22);transition:left 0.2s}
.cb{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #C7C7CC;transition:all 0.15s}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;background-size:cover;background-position:center}
.pill{display:flex;align-items:center;gap:7px;padding:7px 14px 7px 7px;border-radius:24px;border:2px solid #E5E5EA;cursor:pointer;background:none;font-family:inherit;white-space:nowrap}
.day-btn{min-width:42px;padding:8px 6px;border-radius:10px;border:2px solid #E5E5EA;background:#fff;font-size:13px;font-weight:600;color:#8E8E93;cursor:pointer;font-family:inherit;transition:all 0.15s}
.day-btn.on{background:#1C3A6B;border-color:#1C3A6B;color:#fff}
.fab{position:fixed;bottom:72px;right:16px;z-index:50}
.fab-btn{width:56px;height:56px;border-radius:28px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:32px;line-height:1;color:#fff;transition:all 0.2s;font-family:inherit;box-shadow:0 4px 20px rgba(28,58,107,0.4);padding:0}
.fab-menu{position:absolute;bottom:66px;right:0;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.fab-item{display:flex;align-items:center;gap:10px;padding:11px 18px;background:#1C1C1E;border-radius:24px;border:none;cursor:pointer;font-family:inherit;color:#fff;font-size:15px;font-weight:600;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.25)}
.notif{position:absolute;top:10px;left:12px;right:12px;z-index:999;background:rgba(28,28,30,0.94);border-radius:16px;padding:12px 14px;cursor:pointer;animation:sdown 0.3s ease}
.chev::after{content:'';display:inline-block;width:7px;height:7px;border-right:2px solid #C7C7CC;border-top:2px solid #C7C7CC;transform:rotate(45deg);margin-left:4px}
.photo-wrap{width:88px;height:88px;border-radius:44px;border:3px dashed #C7C7CC;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin:0 auto;background:#F8F8F8;overflow:hidden}
.freq-btn{flex:1;padding:10px 6px;border-radius:10px;border:2px solid #E5E5EA;background:#fff;color:#8E8E93;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.freq-btn.on{background:#EBF0FF;border-color:#1C3A6B;color:#1C3A6B}
.sub-tab{padding:12px 16px;font-size:15px;font-weight:600;border:none;background:transparent;cursor:pointer;font-family:inherit;border-bottom:3px solid transparent}
.sub-tab.on{color:#1C3A6B;border-bottom-color:#1C3A6B}
.sub-tab.off{color:#8E8E93}
.spinner{width:32px;height:32px;border:3px solid #E5E5EA;border-top-color:#1C3A6B;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes sdown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes packed{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

let _tesseractLoaded=false;
async function loadTesseract(){
  if(_tesseractLoaded)return window.Tesseract;
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js';
    s.onload=()=>{_tesseractLoaded=true;resolve(window.Tesseract);};
    s.onerror=()=>reject(new Error('OCR library failed to load'));
    document.head.appendChild(s);
  });
}

}

}
function isSchoolDay(dateStr){
  const d=new Date(dateStr+'T12:00');
  const dow=d.getDay();
  // Weekend = no school
  if(dow===0||dow===6)return false;
  // Check if within any term
  const td=S.termDates;
  if(!td||(!td.t1s&&!td.t2s&&!td.t3s&&!td.t4s)){
    // No terms set - assume any weekday is school day
    return true;
  }
  for(const t of ['t1','t2','t3','t4']){
    const start=td[t+'s'],end=td[t+'e'];
    if(start&&end&&dateStr>=start&&dateStr<=end)return true;
  }
  return false;
}
function getViewDate(){
  const d=new Date(today);
  d.setDate(today.getDate()+(S.dayOffset||0));

}
function getViewDateStr(){return fd(getViewDate());}
function genICS(events){
  // Generate iCalendar file content
  const fmt=d=>{
    const pad=n=>String(n).padStart(2,'0');
    return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00';
  };
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//HomeBase//EN\r\nCALSCALE:GREGORIAN\r\n';
  events.forEach(ev=>{
    if(!ev.date&&!ev.startDate)return;
    const d=ev.date||ev.startDate;
    const start=new Date(d+'T09:00');
    const end=new Date(d+'T10:00');
    // Try to parse time
    if(ev.time){
      const tm=ev.time.match(/(\d{1,2})[:\.]?(\d{0,2})\s*(am|pm)?/i);
      if(tm){
        let h=parseInt(tm[1]);
        if(tm[3]&&tm[3].toLowerCase()==='pm'&&h<12)h+=12;
        start.setHours(h,parseInt(tm[2]||'0'));
        end.setHours(h+1,parseInt(tm[2]||'0'));
      }
    }
    ics+='BEGIN:VEVENT\r\n';
    ics+='UID:hb-'+(ev.id||Date.now())+'@homebase\r\n';
    ics+='DTSTAMP:'+fmt(new Date())+'\r\n';
    ics+='DTSTART:'+fmt(start)+'\r\n';
    ics+='DTEND:'+fmt(end)+'\r\n';
    ics+='SUMMARY:'+(ev.emoji||'')+(ev.emoji?' ':'')+(ev.title||'Event').replace(/[\n\r]/g,' ')+'\r\n';
    if(ev.location)ics+='LOCATION:'+ev.location.replace(/[\n\r]/g,' ')+'\r\n';
    let desc=[];
    if(ev.dropoff)desc.push('Drop-off: '+ev.dropoff);
    if(ev.pickup)desc.push('Pick-up: '+ev.pickup);
    if(ev.notes)desc.push(ev.notes);
    if(desc.length)ics+='DESCRIPTION:'+desc.join(' \\n ').replace(/[\n\r]/g,' ')+'\r\n';
    if(ev.freq==='weekly'){
      const days=Object.keys(ev.days||{}).filter(k=>ev.days[k]).map(d=>d.toUpperCase().slice(0,2)).join(',');
      if(days)ics+='RRULE:FREQ=WEEKLY;BYDAY='+days+(ev.endDate?';UNTIL='+fmt(new Date(ev.endDate+'T23:59')):'')+'\r\n';
    }else if(ev.freq==='fortnightly'){
      const days=Object.keys(ev.days||{}).filter(k=>ev.days[k]).map(d=>d.toUpperCase().slice(0,2)).join(',');
      if(days)ics+='RRULE:FREQ=WEEKLY;INTERVAL=2;BYDAY='+days+(ev.endDate?';UNTIL='+fmt(new Date(ev.endDate+'T23:59')):'')+'\r\n';
    }
    ics+='END:VEVENT\r\n';
  });
  ics+='END:VCALENDAR\r\n';
  return ics;
}
function downloadICS(events,filename){
  const ics=genICS(events);
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=(filename||'homebase-events')+'.ics';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

function members(){return Object.entries(S.family&&S.family.members||{}).map(([uid,m])=>({uid,name:m.name,role:m.role,color:m.color||NAVY,relationship:m.relationship||'',photoURL:m.photoURL||'',phone:m.phone||'',email:m.email||''}));}

async function fw(){
  if(S.weather)return;
  // Use manual location if set, otherwise try geolocation
  if(S.manualLat&&S.manualLon){
    try{
      const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+S.manualLat+'&longitude='+S.manualLon+'&current_weather=true&timezone=auto');
      const d=await r.json();
      const wc=d.current_weather?.weathercode||0;
      const icons={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',51:'🌦',61:'🌧',71:'❄️',80:'🌧',95:'⛈'};
      const descs={0:'Sunny',1:'Mostly sunny',2:'Partly cloudy',3:'Cloudy',45:'Foggy',51:'Drizzle',61:'Rainy',71:'Snowy',80:'Showers',95:'Thunderstorm'};
      S.weather={temp:Math.round(d.current_weather?.temperature||20),icon:icons[wc]||'🌤',desc:descs[wc]||'Clear',city:S.manualCity||'Your location'};
      render();
    }catch(e){}
    return;
  }
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+pos.coords.latitude+'&longitude='+pos.coords.longitude+'&current_weather=true&timezone=auto');
      const d=await r.json();
      const wc=d.current_weather?.weathercode||0;
      const icons={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',51:'🌦',61:'🌧',71:'❄️',80:'🌧',95:'⛈'};
      const descs={0:'Sunny',1:'Mostly sunny',2:'Partly cloudy',3:'Cloudy',45:'Foggy',51:'Drizzle',61:'Rainy',71:'Snowy',80:'Showers',95:'Thunderstorm'};
      S.weather={temp:Math.round(d.current_weather?.temperature||20),icon:icons[wc]||'🌤',desc:descs[wc]||'Clear',city:'Current location'};
      render();
    }catch(e){}
  },()=>{});
}

async function createFamily(name){
  const code='HB-'+Math.random().toString(36).substr(2,6).toUpperCase();
  const r=await addDoc(collection(db,'families'),{name,inviteCode:code,createdBy:S.user.uid,createdAt:new Date(),members:{[S.user.uid]:{name:S.user.displayName,role:'Admin',color:NAVY}}});
  await setDoc(doc(db,'users',S.user.uid),{familyId:r.id,name:S.user.displayName});
  return r.id;
}
async function joinFamily(code){
  const q=query(collection(db,'families'),where('inviteCode','==',code.trim().toUpperCase()));
  const s=await getDocs(q);
  if(s.empty)throw new Error('Family not found');
  const fid=s.docs[0].id;
  await updateDoc(doc(db,'families',fid),{['members.'+S.user.uid]:{name:S.user.displayName,role:'Member',color:COLORS[Math.floor(Math.random()*COLORS.length)]}});
  await setDoc(doc(db,'users',S.user.uid),{familyId:fid,name:S.user.displayName});
  return fid;
}
const fid=()=>S.familyId;
const fcol=(p)=>collection(db,'families',fid(),...p);
const fdoc=(p)=>doc(db,'families',fid(),...p);
const fadd=(p,d)=>addDoc(fcol(p),{...d,createdAt:new Date()});
const fupd=(p,d)=>updateDoc(fdoc(p),d);
const fdel=(p)=>deleteDoc(fdoc(p));

function subscribe(){
  S.unsubs.forEach(u=>u());S.unsubs=[];
  S.unsubs.push(onSnapshot(doc(db,'families',fid()),s=>{
    S.family=s.data();
    if(S.family){
      // Sync shared family settings down
      if(S.family.termDates&&Object.values(S.family.termDates).some(v=>v)){
        S.termDates=S.family.termDates;
      }
      if(S.family.location&&S.family.location.lat){
        S.manualLat=S.family.location.lat;
        S.manualLon=S.family.location.lon;
        S.manualCity=S.family.location.city||'';
        if(!S.weather)fw();
      }
    }
    render();
  }));
  S.unsubs.push(onSnapshot(fcol(['children']),s=>{
    S.children=s.docs.map(d=>({id:d.id,...d.data()}));
    if(!S.activeChild&&S.children.length)S.activeChild=S.children[0].id;
    S.children.forEach(c=>{
      const u=onSnapshot(fcol(['children',c.id,'packing']),ps=>{S.packing[c.id]=ps.docs.map(d=>({id:d.id,...d.data()}));render();});
      S.unsubs.push(u);
    });
    render();
  }));
  S.unsubs.push(onSnapshot(fcol(['events']),s=>{S.events=s.docs.map(d=>({id:d.id,...d.data()}));render();}));
  S.unsubs.push(onSnapshot(fcol(['assessments']),s=>{S.assessments=s.docs.map(d=>({id:d.id,...d.data()}));render();}));
  S.unsubs.push(onSnapshot(fcol(['groceries']),s=>{S.groceries=s.docs.map(d=>({id:d.id,...d.data()}));render();}));
  S.unsubs.push(onSnapshot(fcol(['gifts']),s=>{S.gifts=s.docs.map(d=>({id:d.id,...d.data()}));render();}));
  S.unsubs.push(onSnapshot(fcol(['dinners']),s=>{S.dinners=s.docs.map(d=>({id:d.id,...d.data()}));render();}));
  S.unsubs.push(onSnapshot(fcol(['playdates']),s=>{S.playdates=s.docs.map(d=>({id:d.id,...d.data()}));render();}));
  S.unsubs.push(onSnapshot(fcol(['contacts']),s=>{S.contacts=s.docs.map(d=>({id:d.id,...d.data()}));render();}));
  S.unsubs.push(onSnapshot(fcol(['mealIdeas']),s=>{S.mealIdeas=s.docs.map(d=>({id:d.id,...d.data()}));render();}));
}

// ── TODAY ─────────────────────────────────────────
function eventsForChildOnDate(child, dateStr){
  const dateObj = new Date(dateStr+'T12:00');
  return S.events.filter(ev=>{
    if(!ev.childId||ev.childId===child.id){
      if(!ev.freq||ev.freq==='once')return ev.date===dateStr;
      const start=new Date((ev.startDate||ev.date||dateStr)+'T12:00');
      const end=ev.endDate?new Date(ev.endDate+'T12:00'):null;
      if(dateObj<start||(end&&dateObj>end))return false;
      const dn=DAYSH[dateObj.getDay()];
      if(!ev.days||!ev.days[dn])return false;
      if(ev.freq==='fortnightly'){
        const wks=Math.floor((dateObj-start)/(7*86400000));
        return wks%2===0;
      }
      return true;
    }
    return false;
  }).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
}
function todayEventsForChild(child){
  return S.events.filter(ev=>{
    if(!ev.childId||ev.childId===child.id){
      if(!ev.freq||ev.freq==='once')return ev.date===todayStr;
      const start=new Date((ev.startDate||ev.date||todayStr)+'T12:00');
      const end=ev.endDate?new Date(ev.endDate+'T12:00'):null;
      const now=new Date(todayStr+'T12:00');
      if(now<start||(end&&now>end))return false;
      const dn=DAYSH[now.getDay()];
      if(!ev.days||!ev.days[dn])return false;
      if(ev.freq==='fortnightly'){
        const wks=Math.floor((now-start)/(7*86400000));
        return wks%2===0;
      }
      return true;
    }
    return false;
  }).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
}

// ── CALENDAR ──────────────────────────────────────
function sCalendar(){
  const wStart=new Date(today);
  wStart.setDate(today.getDate()-today.getDay()+1+S.calWeekOffset*7);
  const wDates=Array.from({length:7},(_,i)=>{const d=new Date(wStart);d.setDate(wStart.getDate()+i);return d;});
  const sel=S.calDate||todayStr;
  const dayEvs=S.events.filter(ev=>{
    if(!ev.freq||ev.freq==='once')return ev.date===sel;
    const start=new Date((ev.startDate||ev.date||sel)+'T12:00');
    const end=ev.endDate?new Date(ev.endDate+'T12:00'):null;
    const now=new Date(sel+'T12:00');
    if(now<start||(end&&now>end))return false;
    const dn=DAYSH[now.getDay()];
    return ev.days&&ev.days[dn];
  }).sort((a,b)=>(a.time||'').localeCompare(b.time||''));

  return `
    <div style="background:#fff;padding:14px 16px 0;border-bottom:1px solid #F2F2F7;position:sticky;top:0;z-index:10">
      <div style="font-size:26px;font-weight:800;color:#1C1C1E;margin-bottom:12px">Calendar</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <button class="btn" onclick="S.calWeekOffset--;render()" style="color:#1C3A6B;font-size:28px;padding:0 12px">‹</button>
        <div style="font-size:15px;font-weight:700">${MONTHS[wStart.getMonth()]} ${wStart.getFullYear()}</div>
        <button class="btn" onclick="S.calWeekOffset++;render()" style="color:#1C3A6B;font-size:28px;padding:0 12px">›</button>
      </div>
      <div style="display:flex;margin:0 -16px">
        ${wDates.map(d=>{
          const ds=fd(d),isSel=ds===sel,isTod=ds===todayStr;
          const evs=S.events.filter(e=>e.date===ds||(e.freq&&e.freq!=='once'&&(e.startDate||'')<=ds));
          return '<button class="btn" onclick="selCalDate(\''+ds+'\');" style="flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 2px 12px;border-bottom:'+(isSel?'3px solid #1C3A6B':'3px solid transparent')+'">'
            +'<div style="font-size:10px;color:'+(isSel?'#1C3A6B':isTod?'#FF3B30':'#8E8E93')+';font-weight:500;margin-bottom:4px">'+DAYSH[d.getDay()]+'</div>'
            +'<div style="width:34px;height:34px;border-radius:17px;background:'+(isSel?'#1C3A6B':'transparent')+';display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:'+(isSel?'#fff':isTod?'#FF3B30':'#1C1C1E')+'">'+d.getDate()+'</div>'
            +'<div style="display:flex;gap:2px;margin-top:4px">'+evs.slice(0,3).map(e=>{const ec=S.children.find(c=>c.id===e.childId);return '<div style="width:6px;height:6px;border-radius:3px;background:'+(ec?.color||NAVY)+'"></div>';}).join('')+'</div>'
            +'</button>';
        }).join('')}
      </div>
    </div>
    <div class="scroll-view" style="padding:14px 0 80px">
      ${dayEvs.length===0?`<div style="text-align:center;padding:60px 20px"><div style="font-size:56px;margin-bottom:14px">🎉</div><div style="font-size:18px;font-weight:700;margin-bottom:6px">Nothing on!</div><div style="font-size:15px;color:#8E8E93">Tap + to add an event</div></div>`:
      `<div class="sh" style="margin-bottom:10px">${new Date(sel+'T12:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'})}</div>
      ${dayEvs.map(ev=>{const ec=S.children.find(c=>c.id===ev.childId);const col=ec?.color||NAVY;return `<div style="width:calc(100% - 32px);margin:0 16px 10px;background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,0.08)">
        <div style="display:flex;gap:12px">
          <div style="font-size:30px">${ev.emoji||'📅'}</div>
          <div style="flex:1">
            <div style="font-size:16px;font-weight:700">${ev.title}</div>
            ${ev.freq&&ev.freq!=='once'?`<div style="font-size:12px;color:#1C3A6B;font-weight:600;text-transform:capitalize">🔄 ${ev.freq}</div>`:''}
            ${ev.time?`<div style="font-size:13px;color:#8E8E93">⏰ ${ev.time}</div>`:''}
            ${ev.location?`<div style="font-size:13px;color:#8E8E93">📍 ${ev.location}</div>`:''}
            ${ev.dropoff?`<div style="font-size:13px;color:#8E8E93">🚗 Drop-off: ${ev.dropoff}</div>`:''}
            ${ev.pickup?`<div style="font-size:13px;color:#1C3A6B;font-weight:600">🏠 Pick-up: ${ev.pickup}</div>`:''}
            ${ev.packItems?.length?`<div style="font-size:12px;color:#8E8E93;margin-top:4px">🎒 ${ev.packItems.join(', ')}</div>`:''}
            ${ec?`<div style="margin-top:6px;display:flex;align-items:center;gap:6px">${av(ec.name,col,20,ec.photoURL)}<span style="font-size:12px;color:${col};font-weight:600">${ec.name}</span></div>`:''}
          </div>
          <button onclick="dEvent('${ev.id}')" style="color:#FF3B30;font-size:22px;opacity:0.6;border:none;background:none;cursor:pointer;align-self:flex-start">×</button>
        </div>
      </div>`;}).join('')}`}
    </div>
    <div class="fab"><button class="fab-btn" style="background:#1C3A6B" onclick="go('addEvent')">+</button></div>`;
}

function sDinners(){
  // Get this week (today + 6 forward)
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(today.getDate()+i);
    const ds=fd(d);
    const meal=S.dinners?.find(dn=>dn.date===ds);
    days.push({date:ds,dateObj:d,meal:meal});
  }
  // Past dinners (history) - automatically saved
  const pastDinners=(S.dinners||[]).filter(d=>d.date<todayStr).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  // Build meal history with frequency for suggestions
  const mealCounts={};
  pastDinners.forEach(d=>{
    const k=(d.meal||'').toLowerCase().trim();
    if(k)mealCounts[k]=(mealCounts[k]||0)+1;
  });
  const totalUnique=Object.keys(mealCounts).length;
  return `<div style="min-height:100%;display:flex;flex-direction:column">
    <div style="background:var(--card);padding:14px 16px;display:flex;align-items:center;border-bottom:1px solid var(--row-border);position:sticky;top:0;z-index:10">
      <button class="back-btn" onclick="S.listTab='menu';render()">${bk()} Back</button>
      <div style="flex:1;text-align:center;font-size:17px;font-weight:600">🍽 Dinners</div>
      <button class="btn" onclick="go('addDinner')" style="color:var(--navy);font-size:15px;font-weight:600">+ Add</button>
    </div>
    <div style="padding:14px 0 100px">
      <div class="sh" style="margin-bottom:6px">This Week</div>
      <div class="card" style="margin-bottom:14px">
        ${days.map((d,i,arr)=>{
          const isToday=d.date===todayStr;
          const dayLabel=isToday?'TODAY':DAYSH[d.dateObj.getDay()].toUpperCase();
          const dateLabel=d.dateObj.getDate()+' '+MONTHS[d.dateObj.getMonth()];
          return `<div class="row" style="border-bottom:${i<arr.length-1?'1px solid var(--row-border)':'none'}">
            <div style="width:60px;flex-shrink:0">
              <div style="font-size:11px;font-weight:700;color:${isToday?'#FF3B30':'var(--text-secondary)'}">${dayLabel}</div>
              <div style="font-size:12px;color:var(--text-secondary);margin-top:1px">${dateLabel}</div>
            </div>
            ${d.meal?`<div style="flex:1">
              <div style="font-size:15px;font-weight:600">${d.meal.meal}</div>
              ${d.meal.cook?`<div style="font-size:12px;color:var(--text-secondary)">👨‍🍳 ${d.meal.cook}</div>`:''}
              ${d.meal.notes?`<div style="font-size:12px;color:var(--text-secondary);font-style:italic">${d.meal.notes}</div>`:''}
            </div>
            <button onclick="dDinner('${d.meal.id}')" style="color:#FF3B30;font-size:20px;opacity:0.5;border:none;background:none;cursor:pointer">×</button>`:
            `<button onclick="go('addDinner',{date:'${d.date}'})" style="flex:1;text-align:left;color:var(--navy);font-size:14px;font-weight:600;background:none;border:none;cursor:pointer;padding:0;font-family:inherit">+ Plan a meal</button>`}
          </div>`;
        }).join('')}
      </div>

      <!-- MEAL IDEAS LIBRARY -->
      <div class="sh" style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;padding-right:16px">
        <span>💡 Meal Ideas (${(S.mealIdeas||[]).length})</span>
        <button onclick="addMealIdea()" style="background:none;border:none;color:var(--navy);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">+ Add idea</button>
      </div>
      <div class="card" style="margin-bottom:14px">
        ${(S.mealIdeas||[]).length===0?'<div class="row" style="color:var(--text-secondary);font-size:13px;justify-content:center;padding:14px">No ideas yet — tap "Add idea" to start your bank</div>':
          (S.mealIdeas||[]).sort((a,b)=>(a.label||'').localeCompare(b.label||'')).map((m,i,arr)=>`<div class="row" style="border-bottom:${i<arr.length-1?'1px solid var(--row-border)':'none'}">
            <div style="flex:1;font-size:14px">${m.label}</div>
            <button onclick="useMealIdea('${m.id}')" style="padding:5px 10px;border-radius:8px;background:var(--navy-soft);border:none;cursor:pointer;color:var(--navy);font-size:12px;font-weight:600;font-family:inherit;margin-right:6px">Use →</button>
            <button onclick="dMealIdea('${m.id}')" style="color:#FF3B30;font-size:18px;opacity:0.5;border:none;background:none;cursor:pointer">×</button>
          </div>`).join('')}
      </div>

      ${pastDinners.length>0?`
      <div class="sh" style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;padding-right:16px">
        <span>📖 Meal History (${pastDinners.length})</span>
        ${totalUnique>=10?`<span style="font-size:11px;color:var(--text-secondary);font-weight:500;text-transform:none;letter-spacing:0">Auto-suggesting ✨</span>`:`<span style="font-size:11px;color:var(--text-secondary);font-weight:500;text-transform:none;letter-spacing:0">${10-totalUnique} more for suggestions</span>`}
      </div>
      <div class="card" style="margin-bottom:14px">
        ${pastDinners.slice(0,30).map((d,i,arr)=>{
          const dt=new Date(d.date+'T12:00');
          return `<div class="row" style="border-bottom:${i<Math.min(arr.length,30)-1?'1px solid var(--row-border)':'none'}">
            <div style="width:70px;flex-shrink:0;font-size:11px;color:var(--text-secondary)">${DAYSH[dt.getDay()]} ${dt.getDate()}/${dt.getMonth()+1}</div>
            <div style="flex:1">
              <div style="font-size:14px;font-weight:600">${d.meal}</div>
              ${d.cook?`<div style="font-size:11px;color:var(--text-secondary)">👨‍🍳 ${d.cook}</div>`:''}
            </div>
            <button onclick="reuseDinner('${d.id}')" style="padding:5px 10px;border-radius:8px;background:var(--navy-soft);border:none;cursor:pointer;color:var(--navy);font-size:12px;font-weight:600;font-family:inherit;margin-right:6px">↻ Reuse</button>
            <button onclick="saveAsMealIdea('${d.id}')" style="padding:5px 10px;border-radius:8px;background:#34C75920;border:none;cursor:pointer;color:#34C759;font-size:12px;font-weight:600;font-family:inherit" title="Save to ideas bank">💡</button>
          </div>`;
        }).join('')}
        ${pastDinners.length>30?`<div class="row" style="justify-content:center;color:var(--text-secondary);font-size:12px">+${pastDinners.length-30} older meals</div>`:''}
      </div>
      `:''}
    </div>
  </div>`;
}

function sAddDinner(){
  const presetDate=S.screenParams?.date||todayStr;
  const prefillMeal=S.screenParams?.prefillMeal||'';
  const prefillCook=S.screenParams?.prefillCook||'';
  const prefillNotes=S.screenParams?.prefillNotes||'';
  const mems=members();
  // Combine meal ideas + history for suggestions
  const mealCounts={};
  (S.dinners||[]).forEach(d=>{
    const k=(d.meal||'').trim();
    if(k)mealCounts[k]=(mealCounts[k]||0)+1;
  });
  const ideaLabels=(S.mealIdeas||[]).map(m=>m.label).filter(Boolean);
  // Merge: meal ideas + past meals (deduped, ideas first)
  const allMeals=[...new Set([...ideaLabels,...Object.keys(mealCounts).sort((a,b)=>mealCounts[b]-mealCounts[a])])];
  const uniqueMeals=allMeals;
  // Show suggestions if either: 10+ history OR any meal ideas saved
  const showSuggestions=ideaLabels.length>0||Object.keys(mealCounts).length>=10;
  // Pick a random suggestion as placeholder
  const placeholderMeal=showSuggestions?uniqueMeals[Math.floor(Math.random()*Math.min(uniqueMeals.length,8))]:'';
  return `<div style="min-height:100%;display:flex;flex-direction:column;background:var(--bg)">
    <div style="background:var(--card);padding:14px 16px;display:flex;align-items:center;border-bottom:1px solid var(--row-border);position:sticky;top:0;z-index:10">
      <button class="back-btn" onclick="back()">${bk()} Back</button>
      <div style="flex:1;text-align:center;font-size:17px;font-weight:600">Plan Dinner</div>
      <div style="width:60px"></div>
    </div>
    <div style="padding:20px;max-width:560px;margin:auto;width:100%">
      <div style="display:flex;flex-direction:column;gap:12px">
        <input class="input" id="dn-date" type="date" value="${presetDate}"/>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:-6px;padding-left:4px">Date</div>
        <div style="position:relative">
          <input class="input" id="dn-meal" type="text" placeholder="${placeholderMeal||'Meal (e.g. Spaghetti bolognese)'}" value="${prefillMeal}" style="${showSuggestions?'color:var(--text)':''}" oninput="filterMealSuggestions(this.value)"/>
          ${showSuggestions?`<div id="meal-suggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-top:4px;max-height:200px;overflow-y:auto;z-index:5;box-shadow:var(--shadow-md)"></div>`:''}
        </div>
        ${showSuggestions?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:-4px">
          ${uniqueMeals.slice(0,6).map(m=>`<button onclick="document.getElementById('dn-meal').value='${m.replace(/'/g,'&#39;')}'" style="padding:6px 12px;border-radius:14px;background:var(--navy-soft);color:var(--navy);border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">${m}</button>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--text-secondary);margin-top:-2px">💡 ${ideaLabels.length>0?'From your ideas + history':'Auto-suggested from history'} · Tap a suggestion or type your own</div>`:''}
        <select class="input" id="dn-cook">
          <option value="">Who's cooking?</option>
          ${mems.map(m=>`<option value="${m.name}" ${prefillCook===m.name?'selected':''}>${m.name}</option>`).join('')}
          <option value="Takeaway" ${prefillCook==='Takeaway'?'selected':''}>🥡 Takeaway</option>
          <option value="Out" ${prefillCook==='Out'?'selected':''}>🍽 Eating out</option>
        </select>
        <textarea class="input" id="dn-notes" placeholder="Notes (e.g. need to defrost mince)" rows="2" style="resize:none;line-height:1.4">${prefillNotes}</textarea>
        <div id="dnerr" class="err"></div>
        <button class="primary-btn" onclick="hAddDinner()">Save Dinner</button>
      </div>
    </div>
  </div>`;
}

// ── Image shrinking helper for photos ─────────────────
async function shrinkImage(dataUrl, maxSize){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(maxSize/img.width,maxSize/img.height,1);
      const w=Math.round(img.width*ratio);
      const h=Math.round(img.height*ratio);
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.8));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

window.quickAddEvent=async function(){
  const title=prompt('Quick event — what is it?\n(e.g. "Sam soccer Saturday 10am")');
  if(!title||!title.trim())return;
  // Try to parse date/time from the title
  const text=title.trim();
  let date=todayStr,time='',cleanTitle=text;
  // Day of week
  const dayMatch=text.match(/\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday|mon|tue|wed|thu|fri|sat|sun|tomorrow|today)\b/i);
  if(dayMatch){
    const d=new Date(today);
    const dn=dayMatch[1].toLowerCase().slice(0,3);
    if(dn==='tom'){d.setDate(today.getDate()+1);date=fd(d);}
    else if(dn==='tod'){date=todayStr;}
    else{
      const days=['sun','mon','tue','wed','thu','fri','sat'];
      const target=days.indexOf(dn);
      if(target>=0){
        const cur=today.getDay();
        const diff=(target-cur+7)%7||7;
        d.setDate(today.getDate()+diff);
        date=fd(d);
      }
    }
    cleanTitle=cleanTitle.replace(dayMatch[0],'').trim();
  }
  // Time (e.g. 10am, 3:45pm, 14:30)
  const timeMatch=text.match(/\b(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/i);
  if(timeMatch){
    time=timeMatch[0];
    cleanTitle=cleanTitle.replace(timeMatch[0],'').trim();
  }
  if(!cleanTitle)cleanTitle=title.trim();
  try{
    await fadd(['events'],{title:cleanTitle,emoji:'📅',freq:'once',date,time,days:{},packItems:[],notes:''});
    notify('✅ Event added: '+cleanTitle,'⚡');
  }catch(ex){alert('Error: '+ex.message);}
};

window.runOCR=async function(input){
  if(!input||!input.files||!input.files[0])return;
  const file=input.files[0];
  const status=document.getElementById('ocr-status');
  if(status)status.innerHTML='⏳ Loading OCR engine...';
  try{
    const T=await loadTesseract();
    if(status)status.innerHTML='📖 Reading image (this may take 10-20 seconds)...';
    const r=await T.recognize(file,'eng',{
      logger:m=>{if(m.status==='recognizing text'&&status)status.innerHTML='📖 Reading text... '+Math.round(m.progress*100)+'%';}
    });
    const text=r.data.text;
    if(status)status.innerHTML='✅ Done! Auto-filled below. Review and edit.';
    // Try to extract details
    const lines=text.split(/\n+/).map(l=>l.trim()).filter(l=>l.length>2);
    // Find subject (look for common subjects)
    const subjects=['English','Maths','Mathematics','Science','HASS','PDHPE','Geography','History','Art','Music','Drama','Technology','Japanese','French','Italian'];
    let foundSubject='';
    for(const line of lines){
      for(const s of subjects){if(line.toLowerCase().includes(s.toLowerCase())){foundSubject=s;break;}}
      if(foundSubject)break;
    }
    // Title is usually the longest meaningful early line
    const title=lines.slice(0,5).filter(l=>l.length>10&&l.length<80&&!l.match(/^\d/))[0]||lines[0]||'';
    // Date - look for dd/mm/yyyy or dd Month yyyy patterns
    let foundDate='';
    const dateMatch=text.match(/(\d{1,2})[\/\-\s]+(\d{1,2}|Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec|January|February|March|April|May|June|July|August|September|October|November|December)[\/\-\s]+(\d{2,4})/i);
    if(dateMatch){
      const day=dateMatch[1].padStart(2,'0');
      let month=dateMatch[2];
      const year=dateMatch[3].length===2?'20'+dateMatch[3]:dateMatch[3];
      const monthMap={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
      const mLower=month.toLowerCase().slice(0,3);
      if(monthMap[mLower])month=monthMap[mLower];
      else month=String(month).padStart(2,'0');
      foundDate=year+'-'+month+'-'+day;
    }
    // Auto-fill
    if(foundSubject)document.getElementById('asubj').value=foundSubject;
    if(title&&title.length<80)document.getElementById('atitle').value=title;
    if(foundDate)document.getElementById('adue').value=foundDate;
    document.getElementById('anotes').value=text.substring(0,500);
  }catch(ex){
    if(status)status.innerHTML='❌ OCR failed: '+ex.message+' — please enter manually';
  }
};

window.runPlayDateOCR=async function(input){
  if(!input||!input.files||!input.files[0])return;
  const file=input.files[0];
  const status=document.getElementById('pd-ocr-status');
  if(status)status.innerHTML='⏳ Loading OCR engine...';
  try{
    const T=await loadTesseract();
    if(status)status.innerHTML='📖 Reading invite (10-20 seconds)...';
    const r=await T.recognize(file,'eng',{
      logger:m=>{if(m.status==='recognizing text'&&status)status.innerHTML='📖 Reading... '+Math.round(m.progress*100)+'%';}
    });
    const text=r.data.text;
    if(status)status.innerHTML='✅ Done! Review & edit fields below.';
    // Try to find name (usually largest line, often "X's Birthday")
    const lines=text.split(/\\n+/).map(l=>l.trim()).filter(l=>l.length>2);
    const nameMatch=text.match(/(\\w+)['\u2019]s\\s+(\\d+(?:st|nd|rd|th)?\\s+)?birthday/i);
    if(nameMatch){
      document.getElementById('pd-title').value=nameMatch[0];
      if(nameMatch[1])document.getElementById('pd-host').value=nameMatch[1];
    }else if(lines[0]&&lines[0].length<60){
      document.getElementById('pd-title').value=lines[0];
    }
    // Date
    const dateMatch=text.match(/(\\d{1,2})[\\/\\-\\s]+(\\d{1,2}|Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec|January|February|March|April|May|June|July|August|September|October|November|December)[\\/\\-\\s]+(\\d{2,4})/i);
    if(dateMatch){
      const day=dateMatch[1].padStart(2,'0');
      let month=dateMatch[2];
      const year=dateMatch[3].length===2?'20'+dateMatch[3]:dateMatch[3];
      const monthMap={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
      const mLower=month.toLowerCase().slice(0,3);
      if(monthMap[mLower])month=monthMap[mLower];
      else month=String(month).padStart(2,'0');
      document.getElementById('pd-date').value=year+'-'+month+'-'+day;
    }
    // Time
    const timeMatch=text.match(/(\\d{1,2})[:\\.]?(\\d{0,2})\\s*(am|pm|AM|PM)\\s*[-–to]+\\s*(\\d{1,2})[:\\.]?(\\d{0,2})\\s*(am|pm|AM|PM)?/);
    if(timeMatch)document.getElementById('pd-time').value=timeMatch[0];
    // Phone (Australian format)
    const phoneMatch=text.match(/(\\+?61|0)\\d[\\s\\-]?\\d{3,4}[\\s\\-]?\\d{3,4}/);
    if(phoneMatch)document.getElementById('pd-host-phone').value=phoneMatch[0];
    // Address - look for words after "at" or street keywords
    const addrMatch=text.match(/(?:at|address:)\\s*([^\\n]{10,80})/i);
    if(addrMatch)document.getElementById('pd-location').value=addrMatch[1].trim();
    document.getElementById('pd-notes').value=text.substring(0,500);
  }catch(ex){
    if(status)status.innerHTML='❌ OCR failed — '+ex.message+' — please enter manually';
  }
};

// Schedule daily check for notification time
function scheduleDailyNotif(){
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  if(!S.notifTime)return;
  const now=new Date();
  const [hh,mm]=S.notifTime.split(':').map(Number);
  const next=new Date();next.setHours(hh,mm,0,0);
  if(next<=now)next.setDate(next.getDate()+1);
  const delay=next-now;
  setTimeout(function(){
    sendDailyNotif();
    setInterval(sendDailyNotif,86400000);
  },delay);
}
function sendDailyNotif(){
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  const allEvs=S.events.filter(function(ev){
    if(!ev.freq||ev.freq==='once')return ev.date===todayStr;
    const start=new Date((ev.startDate||ev.date||todayStr)+'T12:00');
    const end=ev.endDate?new Date(ev.endDate+'T12:00'):null;
    const now=new Date(todayStr+'T12:00');
    if(now<start||(end&&now>end))return false;
    return ev.days&&ev.days[DAYSH[now.getDay()]];
  });
  let body='';
  if(allEvs.length===0)body='No events today 🎉';
  else body=allEvs.length+' event'+(allEvs.length>1?'s':'')+' today: '+allEvs.slice(0,3).map(function(e){return e.title;}).join(', ');
  new Notification('HomeBase · '+greeting(),{body:body,icon:'data:image/png;base64,iVBORw0KGgo=',tag:'hb-daily',renotify:false});
}

  S.unsubs.forEach(u=>u());S.unsubs=[];
  Object.assign(S,{family:null,familyId:null,children:[],packing:{},events:[],assessments:[],groceries:[],gifts:[],dinners:[],playdates:[],contacts:[],mealIdeas:[],mealIdeas:[],screen:null,screenParams:{},tab:'today',morningMode:false,activeChild:null,fabOpen:false,notif:null,weather:null,evTab:'events',listTab:'menu',listFilter:'all',ef:{freq:'once',days:{Mon:false,Tue:false,Wed:false,Thu:false,Fri:false,Sat:false,Sun:false},packItems:[],emoji:'📅'}});
  await signOut(auth);
};
window.emailCodeInvite=function(){
  const code=S.family?.inviteCode;
  if(!code){notify('No family code yet','⚠️');return;}
  const email=prompt('Email address to invite:');
  if(!email||!email.trim())return;
  const fname=S.family?.name||'our family';
  const subject=encodeURIComponent('Join '+fname+' on HomeBase');
  const body=encodeURIComponent(
    'Hi,\n\n'+
    'I\'d like you to join '+fname+' on HomeBase, our family logistics app.\n\n'+
    'To join:\n'+
    '1. Go to https://ourhomebase.com.au\n'+
    '2. Create an account (or sign in with Google)\n'+
    '3. When asked, choose "Join existing family"\n'+
    '4. Enter family code: '+code+'\n\n'+
    'See you there!'
  );
  window.location.href='mailto:'+email.trim()+'?subject='+subject+'&body='+body;
};
window.copyCode=()=>{const c=S.family?.inviteCode;if(c&&navigator.clipboard)navigator.clipboard.writeText(c).then(()=>notify('Family code copied! 🔗'));else alert('Code: '+(c||''));};
window.shareCode=()=>{
  const c=S.family?.inviteCode;if(!c)return;
  const text=`Join our family on HomeBase!\n\nVisit ourhomebase.com.au\nFamily code: ${c}`;
  if(navigator.share)navigator.share({title:'HomeBase Invite',text}).catch(()=>{});
  else if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>notify('Invite copied! 📤'));
};
window.changeDayOffset=function(delta){
  S.dayOffset=(S.dayOffset||0)+delta;
  render();
};
window.go=go;window.back=back;window.setTab=setTab;window.render=render;window.S=S;

// Load persisted settings
try{
  const loc=JSON.parse(localStorage.getItem('hb_location')||'null');
  if(loc){S.manualLat=loc.lat||'';S.manualLon=loc.lon||'';S.manualCity=loc.city||'';}
  const nt=localStorage.getItem('hb_notif_time');
  if(nt)S.notifTime=nt;
  const td=JSON.parse(localStorage.getItem('hb_terms')||'null');
  if(td)S.termDates=td;
  const nm=localStorage.getItem('hb_night_mode');
  if(nm==='1'){S.nightMode=true;document.documentElement.setAttribute('data-theme','dark');}
}catch(e){}

onAuthStateChanged(auth,async user=>{
  // Fade out the splash overlay once we know the auth state
  setTimeout(function(){
    var sp=document.getElementById('hb-splash');
    if(sp){sp.classList.add('fade');setTimeout(function(){sp.remove();},300);}
  },150);
  S.user=user;
  if(user){
    try{const ud=await getDoc(doc(db,'users',user.uid));if(ud.exists()){const d=ud.data();if(d.familyId){S.familyId=d.familyId;subscribe();}if(d.notifTime)S.notifTime=d.notifTime;}}
    catch(ex){}
    // Schedule daily notification
    setTimeout(function(){scheduleDailyNotif();},2000);
  }
  render();
});
</script>
